# PARAMS_REGISTRY.yaml — DutyFlow（降级版）参数注册表（中文注释版）
#
# 使用规则（CLAUDE.md 黄金规则 4.1 强制执行）：
#   - 所有源文件中使用的数字常量必须先在此处定义。
#   - 源文件在模块初始化时加载此文件（例如通过 PyYAML）。
#   - 不得在代码中直接写死数字，必须从此处引用。
#   - 注释说明业务含义，不只是数值解释。
#
# 最后更新：2026-04-06

# ──────────────────────────────────────────────────────
# 第 1 节：排班范围
# ──────────────────────────────────────────────────────
schedule:
  # 一个排班周期的周数
  # 通常一个完整月份 ≈ 4-5 周；PoC 阶段从 4 周开始
  num_weeks: 4

  # 每周需要值班覆盖的工作天数
  # 5 = 周一至周五（学校周末不开放）
  working_days_per_week: 5

  # 7 天一周中周日的天索引（0=周一 … 6=周日）
  # 用于解析"不要周日"等偏好字符串
  sunday_day_index: 6

# ──────────────────────────────────────────────────────
# 第 2 节：槽位定义
# ──────────────────────────────────────────────────────
slots:
  # 每个槽位代表每天一个楼层区域的值班岗位
  # slot_id 必须与 rules.json → slots 中的键名匹配
  floor_1:
    display_name: "1楼"
    required_headcount: 1       # 每个活跃工作日必须恰好 1 名教师覆盖此槽位

  floor_2_3:
    display_name: "2-3楼"
    required_headcount: 1

  floor_4_5:
    display_name: "4-5楼"
    required_headcount: 1

# ──────────────────────────────────────────────────────
# 第 3 节：值班负荷约束
# ──────────────────────────────────────────────────────
duty_load:
  # 整个排班周期内，一名教师必须被分配的最低值班总次数
  # PoC 阶段设为 0，避免对请假天数多的教师强制赋值
  min_duties_total: 0

  # 整个排班周期内，一名教师最多可被分配的值班总次数
  # 3槽/天 × 20工作日 / N名教师 — 了解实际教师人数后调整
  # 默认值：8（约10人团队，每人约2次/周）
  max_duties_total: 8

  # 单周内一名教师最多可被分配的值班次数
  # 防止月总量达标但某周过载
  max_duties_per_week: 3

  # 一名教师连续值班的最大天数
  # 防止连续多天（如周一-周二-周三）都被分配给同一人
  max_consecutive_duty_days: 2

# ──────────────────────────────────────────────────────
# 第 4 节：求解器配置（CP-SAT）
# ──────────────────────────────────────────────────────
solver:
  # CP-SAT 搜索的挂钟时间限制（秒）
  # 添加 HC-6 极差约束及间隔/偏差软约束后，搜索空间增大，从 30 调整为 60。
  # 2026-04-07：调高至 300s 排查班主任工作日次优解；加入 SC-4/SC-5 后缩回 180s。
  time_limit_seconds: 300

  # CP-SAT 并行搜索工作线程数
  # 设为 1 以获得完全确定性输出（无并行搜索随机性）
  num_search_workers: 1

  # CP-SAT 随机种子（仅在 num_search_workers > 1 时有意义）
  # 保持固定以确保可复现性
  random_seed: 42

  # 是否将搜索进度打印到标准输出
  # 在生产/Streamlit 模式下设为 false 以避免输出混乱
  log_search_progress: true

# ──────────────────────────────────────────────────────
# 第 5 节：数据加载与清洗
# ──────────────────────────────────────────────────────
data_loader:
  # 输入 Excel 文件中预期的工作表名称
  # 如果文件只有一个工作表，此项被忽略，使用第一个工作表
  excel_sheet_name: "排班"

  # Excel 中包含教师姓名的列名
  teacher_name_column: "姓名"

  # 包含可用性/请假备注的列名（脏自由文本）
  notes_column: "备注"

  # 在备注列中找到时表示"本期完全不可用"的字符串
  # 不区分大小写，比较前去除空白字符
  full_unavailability_keywords:
    - "不排"
    - "请假"
    - "病假"
    - "事假"
    - "产假"
    - "离职"

  # 表示"周日不可用"（day_index=6）的字符串
  sunday_unavailability_keywords:
    - "不要周日"
    - "不排周日"
    - "周日不排"

  # 匹配这些值时视为"无约束"（完全可用）
  null_availability_keywords:
    - ""
    - "无"
    - "/"
    - "-"
    - "—"

# ──────────────────────────────────────────────────────
# 第 6 节：输出格式
# ──────────────────────────────────────────────────────
output:
  # 终端美化打印的列宽（字符数）
  terminal_column_width: 12

  # 排班表表头行的日期格式字符串
  date_format: "%Y-%m-%d"

  # 当槽位未被分配时显示的占位符（求解器成功时不应出现）
  unassigned_placeholder: "???"

  # 教师已分配值班槽位的显示符号
  assigned_marker: "●"

  # 教师休息/未分配的显示符号
  off_marker: "·"

  # poc_solver.export_to_excel() 写入的工作表名称
  # 必须同时出现在 data_loader.exclude_sheets，以免被统计为历史数据
  output_sheet_name: "test"

# ──────────────────────────────────────────────────────
# 第 7 节：软约束权重/得分
# 用于 CP-SAT 目标函数（最大化目标分）
# ──────────────────────────────────────────────────────
weights:
  # 学科与日期偏好得分（正向激励）
  pref_banzhuren_weekend: 100   # 班主任排在周五/周日
  pref_english_mon_thu: 50      # 英语排在周一/周四
  pref_chinese_tue: 50          # 语文排在周二
  pref_politics_wed: 50         # 政治排在周三

  # 间隔与分配偏好（正向激励）
  pref_spacing_gap: 30          # 两次值班间隔拉开（>=7天）的加分
  pref_non_banzhuren_double: 40 # 必须单月排2次时，优先分配给非班主任的加分

  # 均衡惩罚（负向扣分，越不平衡扣分越多）
  # 注意：penalty_variance 已注册但不参与目标函数——极差已由硬约束 HC-6 强制执行，
  # 再添加软惩罚属于重复约束。
  penalty_variance: -100        # (未使用 — 参见 HC-6 极差硬约束)
  penalty_avg_deviation: -80    # 偏离"月均目标"的惩罚基数（如班主任月均目标为1）

  # SC-4: 班主任出现在周一到周四的惩罚
  # 净得分 = -200 + max(学科偏好50) + max(间隔30) ≈ -120 → 求解器主动回避
  penalty_bz_non_weekend: -200

  # SC-5: 非班主任"本月已排周五/日 + 还排第二次"的惩罚
  # 触发条件: fri_new + sun_new == 1 AND total_new == 2
  # 第二次收益上限 = deviation改善(80) + pref_non_bz_double(40) = 120
  # -150 使净值 = -30 → 求解器优先让无周末值班老师承担第二次
  penalty_non_bz_weekend_double: -150

# ──────────────────────────────────────────────────────
# 第 8 节：月均目标与极差约束参数
# ──────────────────────────────────────────────────────
monthly_targets:
  # 班主任老师在一个排班周期内预期的新增值班次数
  banzhuren_target: 1

  # 非班主任老师在一个排班周期内预期的新增值班次数
  non_banzhuren_target: 2

  # 各组教师预测值班次数（历史+新增）极差的硬上限。
  # 分别应用于班主任组和非班主任组的总次数/周五/周日三个维度。
  max_projected_range: 1

# ──────────────────────────────────────────────────────
# 第 9 节：软约束阈值
# ──────────────────────────────────────────────────────
soft_constraints:
  # 同一教师两次值班之间的最小间隔周数。
  # 用于 pref_spacing_gap 目标项 —— 满足 w2-w1 >= 此值的周对可获得间隔奖励分。
  min_week_gap: 2
